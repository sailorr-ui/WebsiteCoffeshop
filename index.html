<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Jajanan Seblak - Menu</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --accent-color: #f43f5e; /* Rose/Red for Seblak vibe */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 120px;
        }

        /* --- LOGO & HEADER --- */
        .header-menu {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Update Logo jadi Bulat & Aesthetic */
        .main-logo {
            width: 150px;
            height: 150px;
            object-fit: cover; /* Memastikan gambar memenuhi area bulat */
            border-radius: 50%; /* Membuat logo jadi bulat sempurna */
            margin-bottom: 15px;
            border: 3px solid var(--glass-border); /* Memberikan bingkai tipis */
            background: white; /* Memberikan latar belakang jika gambar transparan */
            box-shadow: 0 0 25px rgba(244, 63, 94, 0.5); /* Efek cahaya di sekitar logo */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-logo:hover {
            transform: scale(1.1) rotate(5deg);
            border-color: var(--accent-color);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }

        /* --- PRODUK GRID --- */
        .produk-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .produk {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .produk:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(244, 63, 94, 0.3);
        }

        .produk img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        .produk h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .harga {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        .note-container {
            margin-bottom: 20px;
        }

        .note-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .note-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .note-input:focus {
            border-color: var(--accent-color);
        }

        /* --- COUNTER --- */
        .counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 5px;
            margin-top: auto;
        }

        .counter button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .counter button:active {
            opacity: 0.7;
        }

        .jumlah {
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* --- CHECKOUT BAR --- */
        .checkout-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        #checkout-button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 60px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3);
            transition: all 0.3s ease;
        }

        #checkout-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(244, 63, 94, 0.5);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .produk-container { padding: 15px; }
            .main-logo { width: 110px; height: 110px; }
        }
    </style>
</head>

<body>

    <div class="header-menu">
        <div class="logo-container">
            <!-- Logo Bulat Aesthetic -->
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/Logo%20Warung%20Seblak%20Jajanan%20vintage.png" 
                 alt="Logo Warung Jajanan Seblak" 
                 class="main-logo">
            <h1>Warung Jajanan Seblak</h1>
        </div>

        <div class="search-box">
            <input type="text" id="search-menu" placeholder="Cari menu favoritmu...">
        </div>
    </div>

    <div class="produk-container">
        <!-- Seblak Mie Sosis -->
        <div class="produk">
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/seblak%20mie%20sosis.jpg" alt="Seblak Mie Sosis">
            <h2>Seblak Mie Sosis</h2>
            <p class="harga">Rp15.000</p>
            <div class="note-container">
                <label class="note-label">Tingkat Kepedasan</label>
                <input type="text" class="note note-input" placeholder="Contoh: Level 5, Sedang...">
            </div>
            <div class="counter">
                <button class="minus">-</button>
                <span class="jumlah">0</span>
                <button class="plus">+</button>
            </div>
        </div>

        <!-- Seblak Ceker -->
        <div class="produk">
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/seblak%20ceker.jpg" alt="Seblak Ceker">
            <h2>Seblak Ceker</h2>
            <p class="harga">Rp15.000</p>
            <div class="note-container">
                <label class="note-label">Tingkat Kepedasan</label>
                <input type="text" class="note note-input" placeholder="Contoh: Tanpa kencur...">
            </div>
            <div class="counter">
                <button class="minus">-</button>
                <span class="jumlah">0</span>
                <button class="plus">+</button>
            </div>
        </div>

        <!-- Cappucino -->
        <div class="produk">
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/Cappucino%20(2).jpg" alt="Cappucino">
            <h2>Good Day Cappucino</h2>
            <p class="harga">Rp8.000</p>
            <div class="note-container">
                <label class="note-label">Note Minuman</label>
                <input type="text" class="note note-input" placeholder="Contoh: Tambah susu, Es sedikit...">
            </div>
            <div class="counter">
                <button class="minus">-</button>
                <span class="jumlah">0</span>
                <button class="plus">+</button>
            </div>
        </div>


        <!-- Beng Beng -->
        <div class="produk">
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/download%20(2).jpg" alt="Beng Beng">
            <h2>Drink Beng Beng</h2>
            <p class="harga">Rp8.000</p>
            <div class="note-container">
                <label class="note-label">Note Minuman</label>
                <input type="text" class="note note-input" placeholder="Contoh: Tambah susu, Es sedikit...">
            </div>
            <div class="counter">
                <button class="minus">-</button>
                <span class="jumlah">0</span>
                <button class="plus">+</button>
            </div>
        </div>
        
        <!-- Pop Ice -->
        <div class="produk">
            <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteWarungJajananSeblak/refs/heads/main/pop%20ice%20taro.jpg" alt="Pop Ice">
            <h2>Pop Ice Taro</h2>
            <p class="harga">Rp10.000</p>
            <div class="note-container">
                <label class="note-label">Note Minuman</label>
                <input type="text" class="note note-input" placeholder="Contoh: Extra topping...">
            </div>
            <div class="counter">
                <button class="minus">-</button>
                <span class="jumlah">0</span>
                <button class="plus">+</button>
            </div>
        </div>
    </div>

    <div class="checkout-container">
        <button id="checkout-button">Checkout Sekarang</button>
    </div>

    <script>
        // Logika Counter
        document.querySelectorAll('.produk').forEach(produk => {
            const plus = produk.querySelector('.plus');
            const minus = produk.querySelector('.minus');
            const jumlahElem = produk.querySelector('.jumlah');
            let jumlah = 0;

            plus.addEventListener('click', () => {
                jumlah++;
                jumlahElem.textContent = jumlah;
            });

            minus.addEventListener('click', () => {
                if (jumlah > 0) {
                    jumlah--;
                    jumlahElem.textContent = jumlah;
                }
            });
        });

        // Logika Search
        const searchInput = document.getElementById("search-menu");
        searchInput.addEventListener("keyup", function() {
            const keyword = this.value.toLowerCase();
            document.querySelectorAll(".produk").forEach(item => {
                const nama = item.querySelector("h2").textContent.toLowerCase();
                item.style.display = nama.includes(keyword) ? "flex" : "none";
            });
        });

        // Logika Checkout
        document.getElementById('checkout-button').addEventListener('click', () => {
            const pesanan = [];
            document.querySelectorAll('.produk').forEach(produk => {
                const nama = produk.querySelector('h2').textContent;
                const harga = parseInt(produk.querySelector('.harga').textContent.replace(/\D/g,''));
                const jumlah = parseInt(produk.querySelector('.jumlah').textContent);
                const note = produk.querySelector('.note-input').value.trim();

                let hargaFinal = harga;
                if((nama.includes("Cappucino") || nama.includes("Pop Ice")) && note !== "") {
                    hargaFinal = harga + 2000;
                }

                if(jumlah > 0) {
                    pesanan.push({ nama, harga: hargaFinal, jumlah, note });
                }
            });

            if(pesanan.length === 0) {
                const toast = document.createElement('div');
                toast.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#f43f5e; color:white; padding:15px 30px; border-radius:10px; z-index:1000; font-weight:600; box-shadow:0 5px 15px rgba(0,0,0,0.3);";
                toast.textContent = "Pilih minimal satu menu dulu ya!";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
                return;
            }

            localStorage.setItem("pesanan", JSON.stringify(pesanan));
            window.location.href = "checkout.html";
        });
    </script>
</body>
</html>
