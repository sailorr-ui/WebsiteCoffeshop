<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="stylesheet" href="style.css" />
  <meta charset="UTF-8" />
  <title>Daftar Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h1>Daftar Menu</h1>

  <div class="produk-container">

    <!-- Seblak Mie Sosis -->
    <div class="produk">
      <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteCoffeshop/refs/heads/main/seblak%20mie%20sosis.jpg" alt="Seblak Mie Sosis" />
      <h2>Seblak Mie Sosis</h2>
      <p class="harga">Rp15.000</p>

      <!-- Level Pedas -->
      <div class="level-pedas">
        <p class="judul-pedas">Tingkat Kepedasan</p>
        <div class="pedas-counter">
          <button class="pedas-minus">-</button>
          <span class="level-jumlah">0</span>
          <button class="pedas-plus">+</button>
        </div>
      </div>

      <!-- Counter Jumlah -->
      <div class="counter">
        <button class="minus">-</button>
        <span class="jumlah">0</span>
        <button class="plus">+</button>
      </div>
    </div>
    
 <!-- Produk lainnya tetap sama -->
    
    <!-- Seblak Ceker -->
    <div class="produk">
      <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteCoffeshop/refs/heads/main/seblak%20mie%20sosis.jpg" alt="Seblak Ceker" />
      <h2>Seblak Ceker</h2>
      <p class="harga">Rp15.000</p>

      <!-- Level Pedas -->
      <div class="level-pedas">
        <p class="judul-pedas">Tingkat Kepedasan</p>
        <div class="pedas-counter">
          <button class="pedas-minus">-</button>
          <span class="level-jumlah">0</span>
          <button class="pedas-plus">+</button>
        </div>
      </div>

      <!-- Counter Jumlah -->
      <div class="counter">
        <button class="minus">-</button>
        <span class="jumlah">0</span>
        <button class="plus">+</button>
      </div>
    </div>

    <!-- Produk lain tetap sama -->
    <div class="produk">
      <img src="https://raw.githubusercontent.com/sailorr-ui/WebsiteCoffeshop/refs/heads/main/Cappucino.jpg" alt="Cappucino" />
      <h2>Cappucino</h2>
      <p class="harga">Rp15.000</p>
      <div class="counter">
        <button class="minus">-</button>
        <span class="jumlah">0</span>
        <button class="plus">+</button>
      </div>
    </div>

    <!-- Produk lainnya tetap sama -->

  </div>

  <div class="checkout-container">
    <button id="checkout-button">Checkout</button>
  </div>

  <script>
    document.querySelectorAll('.produk').forEach(produk => {

      /* ===============================
         COUNTER JUMLAH
      ===============================*/
      const plus = produk.querySelector('.plus');
      const minus = produk.querySelector('.minus');
      const jumlah = produk.querySelector('.jumlah');

      plus.addEventListener('click', () => {
        jumlah.textContent = parseInt(jumlah.textContent) + 1;
      });

      minus.addEventListener('click', () => {
        if (parseInt(jumlah.textContent) > 0) {
          jumlah.textContent = parseInt(jumlah.textContent) - 1;
        }
      });

      /* ===============================
         LEVEL PEDAS (jika ada)
      ===============================*/
      const pedasPlus = produk.querySelector('.pedas-plus');
      const pedasMinus = produk.querySelector('.pedas-minus');
      const levelJumlah = produk.querySelector('.level-jumlah');

      if (pedasPlus && pedasMinus && levelJumlah) {
        let level = 0;
        const maxLevel = 5;

        pedasPlus.addEventListener('click', () => {
          if (level < maxLevel) {
            level++;
            levelJumlah.textContent = level;
          }
        });

        pedasMinus.addEventListener('click', () => {
          if (level > 0) {
            level--;
            levelJumlah.textContent = level;
          }
        });

        // simpan level ke elemen supaya bisa dibaca saat checkout
        produk.dataset.level = level;

        pedasPlus.addEventListener('click', () => {
          produk.dataset.level = level;
        });

        pedasMinus.addEventListener('click', () => {
          produk.dataset.level = level;
        });
      }

    });

    /* ===============================
       CHECKOUT
    ===============================*/
    document.getElementById('checkout-button').addEventListener('click', () => {

      const pesanan = [];

      document.querySelectorAll('.produk').forEach(produk => {
        const nama = produk.querySelector('h2').textContent;
        const harga = parseInt(produk.querySelector('.harga').textContent.replace(/\D/g, ''));
        const jumlah = parseInt(produk.querySelector('.jumlah').textContent);
        const level = produk.dataset.level || null;

        if (jumlah > 0) {
          pesanan.push({ nama, harga, jumlah, level });
        }
      });

      if (pesanan.length === 0) {
        alert('Pilih minimal satu produk sebelum checkout.');
        return;
      }

      localStorage.setItem('pesanan', JSON.stringify(pesanan));
      window.location.href = 'checkout.html';
    });

  </script>

</body>
</html>
