<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Warung Jajanan Seblak</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Midtrans Snap -->
    <script 
        src="https://app.sandbox.midtrans.com/snap/snap.js"
        data-client-key="Mid-client-67s2LUw5jQq9o8Us">
    </script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #020617 50%, #1e1b4b 100%);
            --accent-color: #f43f5e;
            --accent-glow: rgba(244, 63, 94, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            background: #9f1239;
            filter: blur(150px);
            top: -100px;
            left: -100px;
            z-index: -1;
            opacity: 0.15;
        }

        body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            background: #f43f5e;
            filter: blur(150px);
            bottom: -100px;
            right: -100px;
            z-index: -1;
            opacity: 0.1;
        }

        .checkout-container {
            max-width: 650px;
            margin: 0 auto;
        }

        #kembali {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 25px;
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #kembali:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 35px;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(244, 63, 94, 0.2);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }

        .pesanan-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .pesanan-item:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 4px;
            color: #f1f5f9;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .item-price {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-left: 15px;
        }

        .summary-container {
            margin-top: 10px;
            padding-top: 20px;
            border-top: 2px dashed var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #total {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
        }

        #bayar-btn {
            width: 100%;
            margin-top: 10px;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #e11d48, #f43f5e);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(225, 29, 72, 0.4);
            transition: all 0.3s ease;
        }

        #bayar-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(225, 29, 72, 0.6);
            filter: brightness(1.1);
        }

        #bayar-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #f87171;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            display: flex;
            align-items: center;
        }

        .error::before {
            content: "⚠️";
            margin-right: 6px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .glass-card { padding: 20px; }
            #total { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <a href="index.html" id="kembali">&larr; Kembali ke Menu</a>
    
    <h1>Selesaikan Pesanan</h1>

    <!-- Form Nama -->
    <div class="glass-card">
        <span class="section-label">Informasi Pemesan</span>
        <div class="form-group">
            <input type="text" id="nama" placeholder="Masukkan nama kamu">
            <div id="nama-error" class="error" style="display:none;">Nama harus diisi agar pesanan dikenali</div>
        </div>
    </div>

    <!-- Daftar Pesanan -->
    <div class="glass-card">
        <span class="section-label">Detail Pesanan</span>
        <div id="daftar-pesanan"></div>
        
        <div class="summary-container">
            <span style="font-weight: 600; color: var(--text-dim);">Total Bayar</span>
            <div id="total">Rp0</div>
        </div>
    </div>

    <button id="bayar-btn">Bayar Sekarang &rarr;</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmaCTNGhxjX07I94TA7XXOoLNnbmOF4Ts",
        authDomain: "form-checkout-592c3.firebaseapp.com",
        databaseURL: "https://form-checkout-592c3-default-rtdb.firebaseio.com",
        projectId: "form-checkout-592c3",
        storageBucket: "form-checkout-592c3.firebasestorage.app",
        messagingSenderId: "190795533293",
        appId: "1:190795533293:web:49e162fcbd864902f075e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pesanan = JSON.parse(localStorage.getItem('pesanan')) || [];
    const daftarPesanan = document.getElementById('daftar-pesanan');
    const totalElem = document.getElementById('total');
    const bayarBtn = document.getElementById('bayar-btn');
    const namaInput = document.getElementById('nama');
    const namaError = document.getElementById('nama-error');

    let total = 0;

    // Render List Pesanan
    if (pesanan.length === 0) {
        daftarPesanan.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:20px;">Belum ada pesanan terpilih.</p>`;
    } else {
        pesanan.forEach(item => {
            const itemElem = document.createElement('div');
            itemElem.className = 'pesanan-item';

            let teksLevel = (item.level !== undefined && item.level > 0) ? ` (Level Pedas: ${item.level})` : "";
            let teksNote = (item.note && item.note.trim() !== "") ? `<div class="item-meta">Catatan: ${item.note}</div>` : "";

            itemElem.innerHTML = `
                <div class="item-main">
                    <div class="item-name">${item.nama}${teksLevel} <span style="color:var(--accent-color)">x${item.jumlah}</span></div>
                    ${teksNote}
                </div>
                <div class="item-price">
                    Rp${(item.harga * item.jumlah).toLocaleString('id-ID')}
                </div>
            `;

            daftarPesanan.appendChild(itemElem);
            total += item.harga * item.jumlah;
        });
    }

    totalElem.textContent = `Rp${total.toLocaleString('id-ID')}`;

    // Handler Bayar
    bayarBtn.addEventListener('click', () => {
        const nama = namaInput.value.trim();
        if (nama === "") {
            namaError.style.display = 'flex';
            namaInput.focus();
            return;
        }
        namaError.style.display = 'none';

        const itemDetails = pesanan.map((item, index) => {
            let namaProduk = item.nama;
            if (item.level !== undefined && item.level > 0) namaProduk += ` (Lvl ${item.level})`;
            if (item.note && item.note.trim() !== "") namaProduk += ` - Note: ${item.note}`;
            return {
                id: item.nama.replace(/\s/g, "_") + "-" + index,
                price: item.harga,
                quantity: item.jumlah,
                name: namaProduk.substring(0, 50)
            };
        });

        bayarBtn.disabled = true;
        bayarBtn.textContent = "Memproses...";

        // ✅ PERUBAHAN UTAMA: ganti localhost:3000 → /api/create-transaction
        fetch("/api/create-transaction", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                total: total,
                pesanan: pesanan,
                items: itemDetails,
                nama: nama
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.token) {
                snap.pay(data.token, {
                    onSuccess: async function(result) {
                        const now = new Date();
                        const waktuLengkap = now.toLocaleString("id-ID");

                        await push(ref(db, "checkout"), {
                            nama: nama,
                            pesanan: pesanan,
                            total: total,
                            waktu: waktuLengkap,
                            transaksi_id: result.transaction_id,
                            status: result.transaction_status
                        });

                        alert("Pembayaran Berhasil! Terima kasih 🎉");
                        localStorage.removeItem("pesanan");
                        window.location.href = "index.html";
                    },
                    onPending: () => {
                        alert("Menunggu pembayaran...");
                        bayarBtn.disabled = false;
                        bayarBtn.textContent = "Bayar Sekarang →";
                    },
                    onError: () => {
                        alert("Pembayaran gagal, coba lagi ya!");
                        bayarBtn.disabled = false;
                        bayarBtn.textContent = "Bayar Sekarang →";
                    },
                    onClose: () => {
                        bayarBtn.disabled = false;
                        bayarBtn.textContent = "Bayar Sekarang →";
                    }
                });
            } else {
                alert("Gagal mendapatkan token transaksi.");
                bayarBtn.disabled = false;
                bayarBtn.textContent = "Bayar Sekarang →";
            }
        })
        .catch(err => {
            console.error(err);
            alert("Gagal terhubung ke server. Coba lagi!");
            bayarBtn.disabled = false;
            bayarBtn.textContent = "Bayar Sekarang →";
        });
    });
</script>

</body>
</html>
